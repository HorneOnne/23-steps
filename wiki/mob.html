<html lang="en">

<head>
  <meta charset="UTF-8" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      font-family: 'Inter', sans-serif;
      background-image: var(--wiki-body-bg-image);
      background-repeat: repeat;
      background-size: 256px 256px;
      background-color: var(--wiki-bg);
      color: var(--wiki-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: var(--wiki-bg-overlay);
      pointer-events: none;
      z-index: 1;
    }

    main {
      flex: 1;
      position: relative;
      z-index: 2;
    }

    /* Header */
    header {
      background-color: var(--wiki-header-bg);
      height: 60px;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      border-bottom: 1px solid var(--wiki-header-border);
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.4em;
      color: var(--wiki-header-title);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      height: 50px;
      object-fit: contain;
    }

    nav {
      display: flex;
      align-items: center;
    }

    nav a {
      color: var(--wiki-nav-text);
      text-decoration: none;
      font-weight: bold;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: 0.85em;
      transition: color .15s;
    }

    nav a.active {
      background-color: var(--wiki-nav-active-bg);
      color: var(--wiki-nav-active-text);
    }

    nav a:hover:not(.active) {
      color: var(--wiki-nav-active-text);
    }

    /* Page Header */
    .wiki-page-header {
      background-color: var(--wiki-page-header-bg);
      border-bottom: 2px solid var(--wiki-page-header-border);
      padding: 24px 24px 0;
    }

    .breadcrumb {
      font-size: 0.7em;
      color: var(--wiki-breadcrumb);
      margin-bottom: 10px;
    }

    .breadcrumb a {
      color: var(--wiki-breadcrumb);
      text-decoration: none;
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .wiki-page-header h2 {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.85rem, 2.5vw, 1.3rem);
      color: var(--wiki-heading);
      margin-bottom: 5px;
    }

    .wiki-page-header p {
      color: var(--wiki-subheading);
      font-size: 0.83em;
      margin-bottom: 18px;
    }

    .tab-bar {
      display: flex;
      border-top: 1px solid var(--wiki-tab-border);
      overflow-x: auto;
    }

    .tab-bar::-webkit-scrollbar {
      height: 0;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 11px 20px;
      color: var(--wiki-tab-text);
      font-weight: 600;
      font-size: 0.82em;
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s, background .15s;
      text-decoration: none;
      font-family: inherit;
    }

    .tab-btn:hover {
      color: var(--wiki-tab-hover-text);
      background: var(--wiki-tab-hover-bg);
    }

    .tab-btn.active {
      color: var(--wiki-tab-active-text);
      border-bottom-color: var(--wiki-tab-active-border);
      background: var(--wiki-tab-active-bg);
    }

    .tab-btn.disabled {
      opacity: .4;
      cursor: default;
      pointer-events: none;
    }

    .tab-badge {
      font-size: .6em;
      background: var(--wiki-tab-badge-bg);
      border: 1px solid var(--wiki-tab-badge-border);
      color: var(--wiki-tab-badge-text);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* Content wrapper */
    .content-wrap {
      max-width: 860px;
      margin: 24px auto;
      padding: 28px 24px 48px;
      background: var(--wiki-panel-bg);
      backdrop-filter: var(--wiki-panel-blur);
      -webkit-backdrop-filter: var(--wiki-panel-blur);
      border-radius: 10px;
      border: 1px solid var(--wiki-panel-border);
      box-shadow: var(--wiki-panel-shadow);
    }

    /* Mob header card */
    .mob-header-card {
      background: var(--wiki-infobox-bg);
      border: 1px solid var(--wiki-infobox-border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px 28px;
      margin-bottom: 24px;
    }

    .mob-header-img {
      width: 100px;
      height: 100px;
      flex-shrink: 0;
      background: var(--wiki-card-icon-bg);
      border: 1px solid var(--wiki-infobox-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .mob-header-img img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .mob-header-img .ph {
      font-size: 3rem;
      opacity: .3;
    }

    .mob-header-info {
      flex: 1;
      min-width: 0;
    }

    .mob-header-name {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: var(--wiki-heading);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .mob-header-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* Badges */
    .badge {
      font-size: 0.65em;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
    }

    .badge-hostile {
      background: rgba(220, 38, 38, .18);
      border: 1px solid rgba(220, 38, 38, .35);
      color: #f87171;
    }

    .badge-neutral {
      background: rgba(234, 179, 8, .13);
      border: 1px solid rgba(234, 179, 8, .28);
      color: #fbbf24;
    }

    .badge-level {
      background: var(--wiki-mob-level-bg);
      border: 1px solid var(--wiki-mob-level-border);
      color: var(--wiki-mob-level-text);
    }

    .badge-regen {
      background: rgba(74, 222, 128, .12);
      border: 1px solid rgba(74, 222, 128, .28);
      color: #4ade80;
    }

    .badge-stun {
      background: rgba(167, 139, 250, .12);
      border: 1px solid rgba(167, 139, 250, .25);
      color: #a78bfa;
    }

    /* Sections */
    .section {
      background: var(--wiki-stat-bg);
      border: 1px solid var(--wiki-stat-border);
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.62rem;
      color: var(--wiki-section-title);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--wiki-section-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }

    .stat-item {
      background: var(--wiki-card-bg);
      border: 1px solid var(--wiki-infobox-row-border);
      border-radius: 6px;
      padding: 10px 12px;
    }

    .stat-label {
      font-size: 0.58em;
      color: var(--wiki-stat-label);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 0.9em;
      font-weight: 700;
      color: var(--wiki-stat-value);
    }

    .stat-value.green {
      color: #4ade80;
    }

    .stat-value.red {
      color: #f87171;
    }

    .stat-value.yellow {
      color: #fbbf24;
    }

    .stat-value.blue {
      color: #60a5fa;
    }

    .stat-value.purple {
      color: #a78bfa;
    }

    .section-text {
      font-size: 0.84em;
      color: var(--wiki-text);
      line-height: 1.7;
    }

    .section-text code {
      font-size: 0.93em;
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--wiki-infobox-row-border);
      padding: 1px 6px;
      border-radius: 4px;
      color: #60a5fa;
    }

    [data-theme="light"] .section-text code {
      background: rgba(0, 0, 0, .05);
    }

    /* Loot */
    .loot-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .loot-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--wiki-loot-bg);
      border: 1px solid var(--wiki-loot-border);
      border-radius: 6px;
      padding: 10px 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s;
    }

    .loot-row:hover {
      border-color: var(--loot-rarity-color, var(--wiki-input-focus));
      background: color-mix(in srgb, var(--loot-rarity-color, #6ab0f3) 6%, var(--wiki-loot-bg));
    }

    .loot-icon-wrap {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--loot-rarity-color, #2b3a59) 10%, var(--wiki-rarity-icon-base));
      border: 1.5px solid color-mix(in srgb, var(--loot-rarity-color, #2b3a59) 35%, var(--wiki-rarity-icon-border-base));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 8px color-mix(in srgb, var(--loot-rarity-color, #555) 18%, transparent),
        inset 0 0 10px color-mix(in srgb, var(--loot-rarity-color, #555) 8%, transparent);
    }

    .loot-icon-wrap img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .loot-icon-wrap .loot-ph {
      font-size: 1.2rem;
      opacity: .4;
    }

    .loot-info {
      flex: 1;
      min-width: 0;
    }

    .loot-name {
      font-size: 0.82em;
      font-weight: 700;
      color: var(--loot-rarity-color, var(--wiki-loot-name));
    }

    .loot-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }

    .loot-qty {
      font-size: 0.75em;
      color: var(--wiki-loot-qty);
      font-weight: 600;
    }

    .loot-chance {
      font-size: 0.82em;
      font-weight: 700;
      color: var(--wiki-loot-chance);
    }

    .loot-rare-tag {
      font-size: 0.55em;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(251, 146, 60, .15);
      border: 1px solid rgba(251, 146, 60, .3);
      color: #fb923c;
      margin-top: 2px;
    }

    .no-loot {
      font-size: 0.78em;
      color: var(--wiki-text-dimmer);
      padding: 4px 0;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--wiki-btn-bg);
      border: 1px solid var(--wiki-btn-border);
      border-radius: 6px;
      color: var(--wiki-btn-text);
      font-size: 0.78em;
      font-weight: 600;
      padding: 7px 14px;
      text-decoration: none;
      margin-bottom: 20px;
      transition: background .15s, border-color .15s, color .15s;
    }

    .back-btn:hover {
      background: var(--wiki-btn-hover-bg);
      color: var(--wiki-btn-hover-text);
      border-color: var(--wiki-input-focus);
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 80px 20px;
      color: var(--wiki-text-dim);
    }

    .not-found i {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 10px;
      font-size: 0.8em;
      color: var(--wiki-footer-text);
      background-color: var(--wiki-footer-bg);
      border-top: 1px solid var(--wiki-footer-border);
      font-weight: bold;
      position: relative;
      z-index: 2;
    }

    footer a {
      color: var(--wiki-footer-link);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      header {
        height: auto;
        flex-direction: column;
        align-items: stretch;
        padding: 0;
      }

      header h1 {
        justify-content: center;
        padding: 8px 12px 4px;
      }

      .logo {
        height: 40px;
      }

      nav {
        justify-content: center;
        flex-wrap: wrap;
        border-top: 1px solid var(--wiki-header-border);
        padding: 0 4px;
      }

      nav a {
        padding: 8px 12px;
        font-size: 0.75em;
        height: auto;
      }

      .theme-toggle {
        width: 32px;
        height: 32px;
        font-size: 0.9rem;
      }

      .mob-header-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .stat-grid {
        grid-template-columns: 1fr 1fr;
      }

      .content-wrap {
        margin: 12px;
        padding: 20px 16px;
      }
    }
  </style>
</head>

      "SilverBow": "silverbow", "TungstenBow": "tungstenbow", "GoldBow": "goldbow",
      "PlatinumBow": "platinumbow", "TinSword": "tinsword", "LeadSword": "leadsword",
      "TungstenSword": "tungstensword", "PlatinumSword": "platinumsword",
      "CobaltTrident": "cobalt_trident", "WoodenWand": "woodenwand", "OnyxWand": "onyxwand",
      "MorganiteStaff": "morganitewand", "AmethystStaff": "AmethystStaff",
      "SpessartiteStaff": "spessartitegarnetstaff", "AquamarineStaff": "aquamarinestaff",
      "TopazStaff": "topazstaff", "SapphireStaff": "sapphirestaff", "EmeraldStaff": "emeraldstaff",
      "RubyStaff": "rubystaff",
      "CopperHelmet": "copperhelmet", "CopperChestplate": "copperchestplate", "CopperLeggings": "copperleggings",
      "IronHelmet": "ironhelmet", "IronChestplate": "ironchestplate", "IronLeggings": "ironleggings",
      "SilverHelmet": "silverhelmet", "SilverChestplate": "silverchestplate", "SilverLeggings": "silverleggings",
      "GoldHelmet": "goldhelmet", "GoldChestplate": "goldchestplate", "GoldLeggings": "goldleggings",
      "TinHelmet": "tinhelmet", "TinChestplate": "tinchestplate", "TinLeggings": "tinleggings",
      "LeadHelmet": "leadhelmet", "LeadChestplate": "leadchestplate", "LeadLeggings": "leadleggings",
      "TungstenHelmet": "tungstenhelmet", "TungstenChestplate": "tungstenchestplate", "TungstenLeggings": "tungstenleggings",
      "PlatinumHelmet": "platinumhelmet", "PlatinumChestplate": "platinumchestplate", "PlatinumLeggings": "platinumleggings",
      "AmberstoneHelmet": "amberstonehelmet", "AmberstoneChestplate": "amberstonechestplate", "AmberstoneLeggings": "amberstoneleggings",
      "NatureWings": "naturewings", "ThornwoodWings": "thornwoodwings",
      "Onion": "onion", "Garlic": "garlic", "Pumpkin": "pumpkin", "Carrot": "carrot",
      "Potato": "potato", "Tomato": "tomato", "Strawberry": "strawberry", "Corn": "corn", "Eggplant": "eggplant",
      "HealthPotionI": "HealthPotionI", "HealthPotionII": "healthpotionii", "HealthPotionIII": "healthpotioniii",
      "HealthPotionIV": "healthpotioniv", "HealthPotionV": "healthpotionv",
      "RegeneratePotionI": "regeneratepotioni", "RegeneratePotionII": "regeneratepotionii",
      "RegeneratePotionIII": "regeneratepotioniii", "RegeneratePotionIV": "regeneratepotioniv",
      "RegeneratePotionV": "regeneratepotionv", "SwiftnessPotionI": "swiftnesspotioni",
      "SwiftnessPotionII": "swiftnesspotionii", "ManaPotionI": "manapotioni", "ManaPotionII": "manapotionii",
      "ManaPotionIII": "manapotioniii", "ManaPotionIV": "manapotioniv", "ManaPotionV": "manapotionv",
      "StrengthPotion": "strengthpotion", "ResistancePotion": "resistancepotion",
      "Torch": "torch", "Chest": "chest", "GoldCoins": "goldcoin",
      "StarterKit": "StarterKit", "RookieKit": "RookieKit", "MinerKit": "MinerKit", "ScoutKit": "ScoutKit",
      "HunterKit": "HunterKit", "EliteKit": "EliteKit", "VeteranKit": "VeteranKit", "ShadowKit": "ShadowKit",
      "ConquerorKit": "ConquerorKit", "KingKit": "KingKit", "OverlordKit": "OverlordKit", "EternalKit": "EternalKit",
      "AdKey": "adKey", "RareKey": "RareKey", "MythicKey": "MythicKey", "DivineKey": "DivineKey",
      "Gravel": "gravel", "Flint": "flint", "Clay": "clay", "HayBale": "haybale", "SnowBrick": "snowbrick",
      "SmoothSand": "smoothsand", "SandBrick": "sandbrick", "SmoothSandBrick": "smoothsandbrick",
      "Apple": "apple", "CookedMeat": "cookedmeat", "WaterBottle": "waterbottle",
    };

    var RARITY_COLOR = {
      Common: '#b0bec5', Uncommon: '#4ade80', Rare: '#60a5fa', Epic: '#c084fc', Legendary: '#fb923c'
    };

    /* Build item config map for rarity lookups */
    var itemConfigMap = {};
    (function () {
      var cfgs = (typeof ITEM_CONFIGS !== 'undefined' ? ITEM_CONFIGS.ItemConfigs : []) || [];
      cfgs.forEach(function (c) { itemConfigMap[c.ItemID] = c; });
    })();

    function itemIconSrc(itemId) {
      var f = ICON_MAP[itemId];
      return f ? 'assets/items/' + f + '.png' : 'assets/items/' + itemId + '.png';
    }

    function itemRarityColor(itemId) {
      var cfg = itemConfigMap[itemId];
      return (cfg && RARITY_COLOR[cfg.Rarity]) || RARITY_COLOR.Common;
    }

    function itemDisplayName(itemId) {
      var cfg = itemConfigMap[itemId];
      return cfg ? cfg.Name : itemId;
    }

    /* Load mob data */
    var allMobs = (typeof MOB_CONFIGS !== 'undefined' ? MOB_CONFIGS.MobConfigs : []) || [];

    /* Get mob id from URL */
    var params = {};
    location.search.replace(/[?&]([^=]+)=([^&]*)/g, function (_, k, v) { params[k] = decodeURIComponent(v); });
    var mobId = params.id || '';
    var mob = allMobs.find(function (m) { return m.MobID === mobId; });

    if (!mob) {
      document.getElementById('pageContent').innerHTML =
        '<div class="not-found"><i class="fas fa-ghost"></i><p>Mob not found.</p><a class="back-btn" href="mobs.html"><i class="fas fa-arrow-left"></i> Back to Mobs</a></div>';
    } else {
      var c = mob.CombatConfig, h = mob.HealthConfig, loot = mob.LootConfig, mv = mob.MovementConfig;
      var ai = mob.AIConfig;
      var hostile = ai.IsHostileToPlayer;
      var mobName = mob.MobName;

      document.title = mobName + ' — Mine & Dungeon Wiki | 23-Steps';
      document.getElementById('breadcrumbName').textContent = mobName;
      document.getElementById('pageHeading').innerHTML = '<i class="fas fa-skull"></i>&nbsp; ' + mobName;
      document.getElementById('pageSubtitle').textContent = hostile ? 'Hostile mob' : 'Neutral mob';

      var badges =
        '<span class="badge ' + (hostile ? 'badge-hostile' : 'badge-neutral') + '">' + (hostile ? '&#128308; Hostile' : '&#128992; Neutral') + '</span>';
      if (h.CanRegenerate) badges += '<span class="badge badge-regen">&#9829; Regenerates</span>';
      if (mv && mv.CanBeStunned) badges += '<span class="badge badge-stun">&#128165; Stunnable</span>';
      if (mv && !mv.CanBeStunned) badges += '<span class="badge" style="background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.25);color:#94a3b8">&#128683; Unstunnable</span>';

      /* Health */
      var healthHtml = '<div class="stat-grid">';
      healthHtml += stat('Max HP', fmt(h.MaxHealth), 'green');
      healthHtml += stat('I-Frames', h.InvulnerabilityDuration + 's', '');
      if (h.CanRegenerate) {
        healthHtml += stat('Regen Rate', fmt(h.RegenerationRate) + '/s', 'green');
        healthHtml += stat('Regen Delay', h.RegenerationDelay + 's', '');
      }
      healthHtml += '</div>';

      /* Combat */
      var combatHtml = '<div class="stat-grid">';
      combatHtml += stat('Damage', fmt(c.Damage), 'red');
      combatHtml += stat('Defense', fmt(c.Defense), 'blue');
      combatHtml += stat('Attack Speed', fmt(c.AttackSpeed) + 'x', '');
      combatHtml += stat('Attack Range', fmt(c.AttackRange), '');
      combatHtml += stat('Move Speed', fmt(c.MoveSpeed) + 'x', 'yellow');
      if (c.FlightSpeedMultiplier && c.FlightSpeedMultiplier !== 1.0) {
        combatHtml += stat('Flight Speed', fmt(c.FlightSpeedMultiplier) + 'x', 'yellow');
      }
      combatHtml += stat('Knockback', fmt(c.KnockbackForce), '');
      combatHtml += stat('KB Resist', pct(c.KnockbackResistance), '');

      combatHtml += '</div>';

      /* Loot */
      var lootHtml = '';
      if (loot.DropsLoot && loot.LootDrops && loot.LootDrops.length) {
        lootHtml += '<div class="loot-grid">';
        loot.LootDrops.forEach(function (d) {
          var qty = d.MinQuantity === d.MaxQuantity ? 'x' + d.MinQuantity : 'x' + d.MinQuantity + ' \u2013 x' + d.MaxQuantity;
          var src = itemIconSrc(d.ItemID);
          var rc = itemRarityColor(d.ItemID);
          var name = itemDisplayName(d.ItemID);
          lootHtml += '<a class="loot-row" href="item.html?id=' + encodeURIComponent(d.ItemID) + '" style="--loot-rarity-color:' + rc + '">';
          lootHtml += '<div class="loot-icon-wrap"><img src="' + src + '" alt="' + name + '" onerror="this.style.display=\x27none\x27;this.nextElementSibling.style.display=\x27flex\x27" />' +
            '<span class="loot-ph" style="display:none">&#128142;</span></div>';
          lootHtml += '<div class="loot-info"><div class="loot-name">' + name + '</div></div>';
          lootHtml += '<div class="loot-right"><span class="loot-qty">' + qty + '</span><span class="loot-chance">' + pct(d.DropChance) + '</span></div>';
          lootHtml += '</a>';
        });
        if (loot.HasRareDrop && loot.RareDrop && loot.RareDrop.ItemID !== 'None') {
          var rd = loot.RareDrop;
          var rqty = rd.MinQuantity === rd.MaxQuantity ? 'x' + rd.MinQuantity : 'x' + rd.MinQuantity + ' \u2013 x' + rd.MaxQuantity;
          var rsrc = itemIconSrc(rd.ItemID);
          var rrc = itemRarityColor(rd.ItemID);
          var rname = itemDisplayName(rd.ItemID);
          lootHtml += '<a class="loot-row" href="item.html?id=' + encodeURIComponent(rd.ItemID) + '" style="--loot-rarity-color:' + rrc + '">';
          lootHtml += '<div class="loot-icon-wrap"><img src="' + rsrc + '" alt="' + rname + '" onerror="this.style.display=\x27none\x27;this.nextElementSibling.style.display=\x27flex\x27" />' +
            '<span class="loot-ph" style="display:none">&#128142;</span></div>';
          lootHtml += '<div class="loot-info"><div class="loot-name">' + rname + ' <span class="loot-rare-tag">RARE</span></div></div>';
          lootHtml += '<div class="loot-right"><span class="loot-qty">' + rqty + '</span><span class="loot-chance">' + pct(loot.RareDropChance) + '</span></div>';
          lootHtml += '</a>';
        }
        lootHtml += '</div>';
      } else {
        lootHtml = '<div class="no-loot">No loot drops.</div>';
      }

      /* Assemble */
      document.getElementById('pageContent').innerHTML =
        '<a class="back-btn" href="mobs.html"><i class="fas fa-arrow-left"></i> Back to Mobs</a>' +
        '<div class="mob-header-card">' +
        '<div class="mob-header-img">' +
        '<img src="assets/mobs/' + mob.MobID.toLowerCase() + '.png" alt="' + mobName + '" onerror="this.style.display=\x27none\x27;this.nextElementSibling.style.display=\x27flex\x27" />' +
        '<span class="ph" style="display:none">&#128128;</span>' +
        '</div>' +
        '<div class="mob-header-info">' +
        '<div class="mob-header-name">' + mobName + '</div>' +
        '<div class="mob-header-badges">' + badges + '</div>' +
        '</div>' +
        '</div>' +
        '<div class="section"><div class="section-title"><i class="fas fa-heart"></i> Health</div>' + healthHtml + '</div>' +

        '<div class="section"><div class="section-title"><i class="fas fa-khanda"></i> Combat</div>' + combatHtml + '</div>' +
        '<div class="section"><div class="section-title"><i class="fas fa-gift"></i> Loot Drops</div>' + lootHtml + '</div>';
    }
  </script>
</body>

</html>
