<html lang="en">

<head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #161a24;
            --surface2: #1e2433;
            --border: #2c3347;
            --accent: #e8a844;
            --accent2: #c77b1e;
            --text: #d4d8e8;
            --text-dim: #7b849a;
            --common: #9ca3af;
            --uncommon: #22d3ee;
            --rare: #6495ed;
            --epic: #a855f7;
            --legendary: #f97316;

            /* category badge colors */
            --cat-resource: #4ade80;
            --cat-accessory: #f472b6;
            --cat-tool: #60a5fa;
            --cat-weapon: #f87171;
            --cat-armor: #fbbf24;
            --cat-wings: #a78bfa;
            --cat-food: #fb923c;
            --cat-potion: #34d399;
            --cat-utility: #94a3b8;
            --cat-kit: #e2e8f0;
            --cat-key: #fde68a;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #0a0c12 0%, #1a1030 50%, #0a0c12 100%);
            border-bottom: 2px solid var(--border);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 80% at 50% -10%, rgba(232, 168, 68, .15) 0%, transparent 70%);
            pointer-events: none;
        }

        header .breadcrumb {
            font-size: .75rem;
            color: var(--text-dim);
            margin-bottom: .6rem;
            letter-spacing: .08em;
        }

        header .breadcrumb a {
            color: var(--accent);
            text-decoration: none;
        }

        header .breadcrumb a:hover {
            text-decoration: underline;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 4vw, 3rem);
            background: linear-gradient(135deg, var(--accent), #fff9e0, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: .05em;
        }

        header p.subtitle {
            color: var(--text-dim);
            margin-top: .5rem;
            font-size: .9rem;
        }

        /* ── Layout ── */
        .page-wrap {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Sticky nav / search bar ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: .75rem;
            align-items: center;
            margin-bottom: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg);
            padding: .75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            flex: 1;
            min-width: 220px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .55rem 1rem;
            color: var(--text);
            font-size: .9rem;
            outline: none;
            transition: border-color .2s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .search-box::placeholder {
            color: var(--text-dim);
        }

        .cat-filters {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
        }

        .cat-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: .3rem .8rem;
            color: var(--text-dim);
            font-size: .78rem;
            cursor: pointer;
            transition: all .18s;
            font-family: inherit;
        }

        .cat-btn:hover,
        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }

        /* ── Category sections ── */
        .category {
            margin-bottom: 3rem;
        }

        .cat-header {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-bottom: 1.25rem;
            padding-bottom: .75rem;
            border-bottom: 1px solid var(--border);
        }

        .cat-badge {
            font-family: 'Cinzel', serif;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .1em;
            padding: .25rem .65rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .cat-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--text);
        }

        .cat-count {
            margin-left: auto;
            color: var(--text-dim);
            font-size: .8rem;
        }

        /* ── Item Grid ── */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: .75rem;
        }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .75rem .5rem .6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .45rem;
            cursor: default;
            transition: transform .15s, box-shadow .15s, border-color .2s;
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, .45);
            border-color: var(--accent);
        }

        .item-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 255, 255, .03) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ID badge */
        .item-id {
            position: absolute;
            top: 5px;
            right: 6px;
            font-size: .6rem;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        /* Icon wrapper — pixel-art friendly */
        .item-icon-wrap {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            overflow: hidden;
            background: var(--surface2);
            flex-shrink: 0;
        }

        .item-icon-wrap img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Fallback icon */
        .item-icon-wrap .icon-missing {
            font-size: 1.5rem;
            opacity: .3;
        }

        .item-name {
            font-size: .7rem;
            text-align: center;
            color: var(--text);
            line-height: 1.3;
            word-break: break-word;
        }

        /* Hidden state for search/filter */
        .item-card.hidden {
            display: none;
        }

        .category.hidden {
            display: none;
        }

        /* ── Rarity colors on card border ── */
        .item-card[data-rarity="Uncommon"] {
            border-color: rgba(34, 211, 238, .3);
        }

        .item-card[data-rarity="Rare"] {
            border-color: rgba(100, 149, 237, .35);
        }

        .item-card[data-rarity="Epic"] {
            border-color: rgba(168, 85, 247, .4);
        }

        .item-card[data-rarity="Legendary"] {
            border-color: rgba(249, 115, 22, .45);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: .8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .item-grid {
                grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            }
        }
    </style>
</head>

        // ── Category meta (colour, label) ────────────────────────────────────────────

            Resources: { color: '#4ade80', label: 'Resources' },
            Accessories: { color: '#f472b6', label: 'Accessories' },
            Tools: { color: '#60a5fa', label: 'Tools' },
            Weapons: { color: '#f87171', label: 'Weapons' },

            Kits: { color: '#e2e8f0', label: 'Kits & Vouchers' },
            Keys: { color: '#fde68a', label: 'Keys' },
        };

        const CAT_ORDER = ['Resources', 'Accessories', 'Tools', 'Weapons', 'Armor', 'Wings', 'Food', 'Potions', 'Utility', 'Kits', 'Keys'];

        // ── Render ────────────────────────────────────────────────────────────────────
        function iconUrl(icon) {
            if (!icon) return null;
            return ICON_PATH + icon + '.png';
        }

        function buildCatalog() {
            const catalog = document.getElementById('itemCatalog');
            catalog.innerHTML = '';

            // Group by category in defined order
            const groups = {};
            CAT_ORDER.forEach(c => groups[c] = []);
            ITEMS.forEach(item => {
                if (groups[item.cat]) groups[item.cat].push(item);
            });

            CAT_ORDER.forEach(cat => {
                const items = groups[cat];
                if (!items.length) return;
                const meta = CAT_META[cat];

                const section = document.createElement('section');
                section.className = 'category';
                section.dataset.cat = cat;

                section.innerHTML = `
      <div class="cat-header">
        <span class="cat-badge" style="background:${meta.color}22;color:${meta.color};border:1px solid ${meta.color}44">${meta.label}</span>
        <h2 class="cat-title">${meta.label}</h2>
        <span class="cat-count">${items.length} items</span>
      </div>
      <div class="item-grid"></div>
    `;

                const grid = section.querySelector('.item-grid');

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.dataset.cat = cat;
                    card.dataset.name = item.name.toLowerCase();
                    card.dataset.id = item.id;

                    const url = iconUrl(item.icon);
                    const iconHtml = url
                        ? `<img src="${url}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'icon-missing\\'>📦</span>'" />`
                        : `<span class="icon-missing">📦</span>`;

                    card.innerHTML = `
        <span class="item-id">#${item.id}</span>
        <div class="item-icon-wrap">${iconHtml}</div>
        <span class="item-name">${item.name}</span>
      `;
                    grid.appendChild(card);
                });

                catalog.appendChild(section);
            });
        }

        // ── Filter logic ──────────────────────────────────────────────────────────────
        let activeCat = 'all';

        function filterCat(btn, cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCat = cat;
            applyFilters();
        }

        function filterItems() {
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            document.querySelectorAll('.item-card').forEach(card => {
                const matchCat = activeCat === 'all' || card.dataset.cat === activeCat;
                const matchName = !query || card.dataset.name.includes(query) || card.dataset.id.includes(query);
                card.classList.toggle('hidden', !(matchCat && matchName));
            });

            // Hide empty sections
            document.querySelectorAll('.category').forEach(sec => {
                const visible = sec.querySelectorAll('.item-card:not(.hidden)').length > 0;
                sec.classList.toggle('hidden', !visible);
            });
        }

        buildCatalog();
    </script>
