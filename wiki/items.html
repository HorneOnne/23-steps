<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Items — Mine &amp; Dungeon Wiki | 23-Steps</title>
  <link rel="icon" type="image/png" href="../icon2.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── Base ─────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('../background-loop.png');
      background-repeat: repeat;
      background-size: 256px 256px;
      background-color: #2b2b2b;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.2));
      pointer-events: none;
      z-index: 1;
    }

    main {
      flex: 1;
      position: relative;
      z-index: 2;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      background-color: #1f1f2e;
      height: 60px;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      border-bottom: 1px solid #333;
      position: relative;
      z-index: 10;
    }

    header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.4em;
      color: #99ccff;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo {
      height: 50px;
      object-fit: contain;
    }

    nav {
      display: flex;
      align-items: center;
    }

    nav a {
      color: #ccc;
      text-decoration: none;
      font-weight: bold;
      padding: 0 20px;
      height: 100%;
      display: flex;
      align-items: center;
      font-size: 0.85em;
    }

    nav a.active {
      background-color: #2b3a59;
      color: white;
    }

    nav a:hover:not(.active) {
      color: #fff;
    }

    /* ── Page header ──────────────────────────────────── */
    .wiki-page-header {
      background-color: #161825;
      border-bottom: 2px solid #2b3a59;
      padding: 28px 24px 20px;
      text-align: center;
    }

    .wiki-page-header .breadcrumb {
      font-size: 0.7em;
      color: #6ab0f3;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .wiki-page-header .breadcrumb a {
      color: #6ab0f3;
      text-decoration: none;
    }

    .wiki-page-header .breadcrumb a:hover {
      text-decoration: underline;
    }

    .wiki-page-header h2 {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.9rem, 2.5vw, 1.5rem);
      color: #99ccff;
      margin-bottom: 8px;
    }

    .wiki-page-header p {
      color: #8fa3c8;
      font-size: 0.85em;
    }

    /* ── Controls bar ─────────────────────────────────── */
    .controls-wrap {
      position: sticky;
      top: 0;
      z-index: 9;
      background-color: #1a1d2e;
      border-bottom: 1px solid #2b3a59;
      padding: 10px 20px;
    }

    .controls {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      background: #101824;
      border: 1px solid #2b3a59;
      border-radius: 5px;
      padding: 7px 12px;
      color: #c8d1e1;
      font-size: 0.85em;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }

    .search-box:focus {
      border-color: #6ab0f3;
    }

    .search-box::placeholder {
      color: #4a576b;
    }

    .cat-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .cat-btn {
      background: #101824;
      border: 1px solid #2b3a59;
      border-radius: 4px;
      padding: 5px 10px;
      color: #8fa3c8;
      font-size: 0.72em;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      font-weight: bold;
    }

    .cat-btn:hover {
      background: #1e2d4a;
      border-color: #6ab0f3;
      color: #c8d1e1;
    }

    .cat-btn.active {
      background: #2b3a59;
      border-color: #6ab0f3;
      color: #fff;
    }

    /* ── Content wrap ─────────────────────────────────── */
    .content-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── Category sections ────────────────────────────── */
    .category {
      margin-bottom: 36px;
    }

    .cat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #2b3a59;
    }

    .cat-badge {
      font-size: 0.6em;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.07em;
    }

    .cat-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.75rem;
      color: #6ab0f3;
    }

    .cat-count {
      margin-left: auto;
      color: #4a576b;
      font-size: 0.75em;
    }

    /* ── Item Grid ────────────────────────────────────── */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
    }

    /* ── Item Card (Terraria wiki style) ──────────────── */
    .item-card {
      background-color: #0d1420;
      border: 1px solid #222a33;
      border-radius: 6px;
      padding: 8px 6px 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color .15s, background-color .15s, transform .12s;
      position: relative;
      text-decoration: none;
      color: inherit;
    }

    .item-card:hover {
      border-color: var(--rarity-color, #3a7ee0);
      background-color: #141e30;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    /* rarity left border accent */
    .item-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 6px 0 0 6px;
      background: var(--rarity-color, #555);
    }

    .item-icon-wrap {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--rarity-color, #555) 10%, #111827);
      border: 1px solid color-mix(in srgb, var(--rarity-color, #555) 25%, #1e293b);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 0 8px color-mix(in srgb, var(--rarity-color, #555) 20%, transparent),
        inset 0 0 12px color-mix(in srgb, var(--rarity-color, #555) 8%, transparent);
      transition: box-shadow .15s;
    }

    .item-card:hover .item-icon-wrap {
      box-shadow: 0 0 14px color-mix(in srgb, var(--rarity-color, #555) 35%, transparent),
        inset 0 0 16px color-mix(in srgb, var(--rarity-color, #555) 15%, transparent);
    }

    .item-icon-wrap img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .icon-missing {
      font-size: 1.4rem;
      opacity: 0.25;
    }

    .item-name {
      font-size: 0.62rem;
      font-weight: 500;
      text-align: center;
      color: #e2e8f0;
      line-height: 1.35;
      word-break: break-word;
    }

    .item-rarity-label {
      font-size: 0.42rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--rarity-color, #b0bec5);
      background: color-mix(in srgb, var(--rarity-color, #555) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--rarity-color, #555) 30%, transparent);
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1.4;
    }

    .item-type-label {
      font-size: 0.5rem;
      color: #4a576b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .item-card.hidden {
      display: none !important;
    }

    .category.hidden {
      display: none !important;
    }

    /* ── Rarity colours ───────────────────────────────── */
    .rarity-Common {
      --rarity-color: #b0bec5;
    }

    .rarity-Uncommon {
      --rarity-color: #4ade80;
    }

    .rarity-Rare {
      --rarity-color: #60a5fa;
    }

    .rarity-Epic {
      --rarity-color: #c084fc;
    }

    .rarity-Legendary {
      --rarity-color: #fb923c;
    }

    /* ── Loading / error ──────────────────────────────── */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: #6a7f9e;
      font-size: 0.9em;
    }

    .loading-state i {
      font-size: 2rem;
      margin-bottom: 14px;
      display: block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 10px;
      font-size: 0.8em;
      color: #ccc;
      background-color: #1f1f2e;
      border-top: 1px solid #333;
      font-weight: bold;
      position: relative;
      z-index: 2;
    }

    footer a {
      color: #79aaff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .item-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }

      .wiki-page-header h2 {
        font-size: 0.8rem;
      }
    }
  </style>
</head>

    // ── Category mapping from ItemType ────────────────────────────────────────────
    const TYPE_TO_CAT = {
      "Sword": "Weapons",
      "Bow": "Weapons",
      "Staff": "Weapons",
      "Wand": "Weapons",
      "Trident": "Weapons",
      "Pickaxe": "Tools",
      "Axe": "Tools",
      "Armor": "Armor",
      "Accessory": "Accessories",
      "Shield": "Accessories",
      "Wings": "Wings",
      "Utility": "Utility",
    };

    // ItemID prefix/suffix patterns for Resource & Consumable disambiguation
    const KEY_IDS = ['AdKey', 'RareKey', 'MythicKey', 'DivineKey'];
    const KIT_IDS = ['Kit', 'Voucher', 'Certificate'];
    const FOOD_IDS = ['Onion', 'Garlic', 'Pumpkin', 'Carrot', 'Potato', 'Tomato', 'Strawberry', 'Corn', 'Eggplant', 'Apple', 'Donut', 'CookedMeat', 'WaterBottle'];
    const POTION_IDS = ['Potion', 'Mana', 'Stamina', 'Strength', 'Resistance']; // substring match

    const CAT_META = {
      Resources: { color: '#4ade80', label: 'Resources' },
      Accessories: { color: '#f472b6', label: 'Accessories' },
      Tools: { color: '#60a5fa', label: 'Tools' },
      Weapons: { color: '#f87171', label: 'Weapons' },
      Armor: { color: '#fbbf24', label: 'Armor' },
      Wings: { color: '#a78bfa', label: 'Wings' },
      Food: { color: '#fb923c', label: 'Food' },
      Potions: { color: '#34d399', label: 'Potions' },
      Utility: { color: '#94a3b8', label: 'Utility' },
      Kits: { color: '#e2e8f0', label: 'Kits & Vouchers' },
      Keys: { color: '#fde68a', label: 'Keys' },
    };

    const CAT_ORDER = ['Resources', 'Accessories', 'Tools', 'Weapons', 'Armor', 'Wings', 'Food', 'Potions', 'Utility', 'Kits', 'Keys'];

    const RARITY_COLOR = {
      Common: '#b0bec5',
      Uncommon: '#4ade80',
      Rare: '#60a5fa',
      Epic: '#c084fc',
      Legendary: '#fb923c',
    };

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function iconUrl(itemID) {
      const file = ICON_MAP[itemID];
      return file ? ICON_PATH + file + '.png' : null;
    }

    function guessCategory(cfg) {
      const id = String(cfg.ItemID || '');
      // Direct ItemType mapping (covers most non-resource types)
      if (TYPE_TO_CAT[cfg.ItemType]) return TYPE_TO_CAT[cfg.ItemType];

      // Resource items: figure out actual category by ItemID
      if (cfg.ItemType === 'Resource') {
        if (KEY_IDS.includes(id)) return 'Keys';
        if (KIT_IDS.some(k => id.endsWith(k))) return 'Kits';
        if (FOOD_IDS.some(f => id.includes(f))) return 'Food';
        return 'Resources';
      }

      // Consumable items: figure out by ItemID patterns
      if (cfg.ItemType === 'Consumable') {
        if (KIT_IDS.some(k => id.endsWith(k))) return 'Kits';
        if (FOOD_IDS.some(f => id.includes(f))) return 'Food';
        if (POTION_IDS.some(p => id.includes(p))) return 'Potions';
        return 'Potions'; // default consumable fallback
      }

      return 'Resources';
    }

    // ── Build page ────────────────────────────────────────────────────────────────
    let allCards = [];
    let activeCat = 'all';

    async function init() {
      const data = (typeof ITEM_CONFIGS !== 'undefined') ? ITEM_CONFIGS : await fetch('item_configs.json').then(r => r.json());
      const configs = data.ItemConfigs || data;

      // Group by category
      const groups = {};
      CAT_ORDER.forEach(c => groups[c] = []);

      configs.forEach(cfg => {
        const cat = guessCategory(cfg);
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(cfg);
      });

      // Build category filter buttons
      const filterBar = document.getElementById('catFilters');
      CAT_ORDER.forEach(cat => {
        if (!groups[cat] || !groups[cat].length) return;
        const meta = CAT_META[cat];
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.dataset.cat = cat;
        btn.textContent = meta.label;
        btn.onclick = () => filterCat(btn, cat);
        btn.style.setProperty('--btn-color', meta.color);
        filterBar.appendChild(btn);
      });

      // Build catalog
      const catalog = document.getElementById('itemCatalog');
      catalog.innerHTML = '';

      CAT_ORDER.forEach(cat => {
        const items = groups[cat];
        if (!items || !items.length) return;
        const meta = CAT_META[cat];

        const section = document.createElement('section');
        section.className = 'category';
        section.dataset.cat = cat;
        section.innerHTML = `
          <div class="cat-header">
            <span class="cat-badge" style="background:${meta.color}22;color:${meta.color};border:1px solid ${meta.color}55">${meta.label}</span>
            <h3 class="cat-title">${meta.label}</h3>
            <span class="cat-count">${items.length} items</span>
          </div>
          <div class="item-grid"></div>`;

        const grid = section.querySelector('.item-grid');

        items.forEach(cfg => {
          const url = iconUrl(cfg.ItemID);
          const iconHtml = url
            ? `<img src="${url}" alt="${cfg.Name}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'icon-missing\\'>📦</span>'" />`
            : `<span class="icon-missing">📦</span>`;

          const rarityColor = RARITY_COLOR[cfg.Rarity] || '#b0bec5';
          const card = document.createElement('a');
          card.className = `item-card rarity-${cfg.Rarity}`;
          card.href = `${DETAIL_PAGE}?id=${encodeURIComponent(cfg.ItemID)}`;
          card.dataset.cat = cat;
          card.dataset.name = cfg.Name.toLowerCase();
          card.dataset.type = cfg.ItemType.toLowerCase();
          card.style.setProperty('--rarity-color', rarityColor);

          card.innerHTML = `
          <div class="item-icon-wrap">${iconHtml}</div>
          <span class="item-name">${cfg.Name}</span>
          <span class="item-rarity-label">${cfg.Rarity}</span>`;

          grid.appendChild(card);
          allCards.push(card);
        });

        catalog.appendChild(section);
      });
    }

    // ── Filter ─────────────────────────────────────────────────────────────────────
    function filterCat(btn, cat) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = cat;
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      allCards.forEach(card => {
        const matchCat = activeCat === 'all' || card.dataset.cat === activeCat;
        const matchQ = !q || card.dataset.name.includes(q) || card.dataset.type.includes(q);
        card.classList.toggle('hidden', !(matchCat && matchQ));
      });
      document.querySelectorAll('.category').forEach(sec => {
        sec.classList.toggle('hidden', !sec.querySelectorAll('.item-card:not(.hidden)').length);
      });
    }

    init().catch(err => {
      document.getElementById('itemCatalog').innerHTML =
        `<div class="loading-state"><i class="fas fa-exclamation-triangle" style="animation:none;color:#f87171;"></i>Failed to load item data.<br/><small>${err.message}</small></div>`;
    });
