        }

            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.2));
            pointer-events: none;
            z-index: 1;
        }

        main {

            position: relative;
            z-index: 2;
        }

            justify-content: space-between;
            align-items: stretch;
            border-bottom: 1px solid #333;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.4em;
            color: #99ccff;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        header h1 a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .logo {
            height: 50px;
            object-fit: contain;
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            font-weight: bold;
            padding: 0 20px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 0.85em;
        }

        nav a.active {
            background-color: #2b3a59;
            color: white;
        }

        nav a:hover:not(.active) {
            color: #fff;
            text-shadow: 0 0 2px #aaa;
        }

        /* ── Page header ──────────────────────────────────────────────────────── */
        .wiki-page-header {
            background-color: #161825;
            border-bottom: 2px solid #2b3a59;
            padding: 28px 24px 20px;
            text-align: center;
        }

            color: #6ab0f3;
            margin-bottom: 10px;
            letter-spacing: 0.04em;
        }

            color: #6ab0f3;
            text-decoration: none;
        }

        .wiki-page-header .breadcrumb a:hover {
            text-decoration: underline;
        }

            font-family: 'Press Start 2P', cursive;
            font-size: clamp(0.9rem, 2.5vw, 1.5rem);
            color: #99ccff;
            margin-bottom: 8px;
            letter-spacing: 0.03em;
        }

        .wiki-page-header p {
            color: #8fa3c8;
            font-size: 0.85em;
        }

        .controls-wrap {
            position: sticky;
            top: 0;
            z-index: 9;
            background-color: #1a1d2e;
            border-bottom: 1px solid #2b3a59;
            padding: 10px 20px;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: #101824;
            border: 1px solid #2b3a59;
            border-radius: 5px;
            padding: 7px 12px;
            color: #c8d1e1;
            font-size: 0.85em;
            outline: none;
            transition: border-color .2s;
            font-family: inherit;
        }

        .search-box:focus {
            border-color: #6ab0f3;
        }

        .search-box::placeholder {
            color: #4a576b;
        }

        .cat-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .cat-btn {
            background: #101824;
            border: 1px solid #2b3a59;
            border-radius: 4px;
            padding: 5px 10px;
            color: #8fa3c8;
            font-size: 0.72em;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit;
            font-weight: bold;
        }

        .cat-btn:hover {
            background: #1e2d4a;
            border-color: #6ab0f3;
            color: #c8d1e1;
        }

        .cat-btn.active {
            background: #2b3a59;
            border-color: #6ab0f3;
            color: #fff;
        }

        /* ── Content wrap ─────────────────────────────────────────────────────── */
        .content-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

            margin-bottom: 36px;
        }

            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #2b3a59;
        }

        .cat-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
            color: #6ab0f3;
        }

        .cat-badge {
            font-size: 0.6em;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 3px;
            letter-spacing: 0.07em;
        }

        .cat-count {
            margin-left: auto;
            color: #4a576b;
            font-size: 0.75em;
        }

        .cat-divider {
            flex: 1;
            height: 1px;
            background: #2b3a59;
        }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 8px;
        }

        .item-card {
            background-color: #101824;
            border: 1px solid #222a33;
            border-radius: 6px;
            padding: 10px 6px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            cursor: default;
            transition: border-color .15s, background-color .15s, transform .12s;
            position: relative;
        }

        .item-card:hover {
            border-color: #3a7ee0;
            background-color: #141e30;
            transform: translateY(-2px);
        }

        .item-id {
            position: absolute;
            top: 4px;
            right: 5px;
            font-size: 0.55rem;
            color: #3a4a5e;
            font-family: Arial, sans-serif;
        }

            align-items: center;
            justify-content: center;
            background: #0d1420;
            border: 1px solid #1e2d40;
            border-radius: 4px;
            overflow: hidden;
        }

            height: 48px;

        }

            font-size: 1.4rem;

            font-size: 0.6rem;
            text-align: center;
            color: #c8d1e1;
            line-height: 1.35;
            word-break: break-word;
        }

        .item-card.hidden {
            display: none;
        }

            display: none;
        }

        // ── Render ────────────────────────────────────────────────────────────────────
        function iconUrl(icon) { return icon ? ICON_PATH + icon + '.png' : null; }

        function buildCatalog() {
            const catalog = document.getElementById('itemCatalog');
            const groups = {};
            CAT_ORDER.forEach(c => groups[c] = []);
            ITEMS.forEach(item => { if (groups[item.cat]) groups[item.cat].push(item); });

            CAT_ORDER.forEach(cat => {
                const items = groups[cat];
                if (!items.length) return;
                const meta = CAT_META[cat];

                const section = document.createElement('section');
                section.className = 'category';
                section.dataset.cat = cat;
                section.innerHTML = `
      <div class="cat-header">
        <span class="cat-badge" style="background:${meta.color}22;color:${meta.color};border:1px solid ${meta.color}55">${meta.label}</span>
        <h3 class="cat-title">${meta.label}</h3>
        <span class="cat-count">${items.length} items</span>
      </div>
      <div class="item-grid"></div>`;

                const grid = section.querySelector('.item-grid');
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.dataset.cat = cat;
                    card.dataset.name = item.name.toLowerCase();
                    card.dataset.id = String(item.id);

                    const url = iconUrl(item.icon);
                    const iconHtml = url
                        ? `<img src="${url}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'icon-missing\\'>📦</span>'" />`
                        : `<span class="icon-missing">📦</span>`;

                    card.innerHTML = `
        <span class="item-id">#${item.id}</span>
        <div class="item-icon-wrap">${iconHtml}</div>
        <span class="item-name">${item.name}</span>`;
                    grid.appendChild(card);
                });

                catalog.appendChild(section);
            });
        }

        // ── Filter ────────────────────────────────────────────────────────────────────
        let activeCat = 'all';

        function filterCat(btn, cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCat = cat;
            applyFilters();
        }

        function filterItems() { applyFilters(); }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            document.querySelectorAll('.item-card').forEach(card => {
                const matchCat = activeCat === 'all' || card.dataset.cat === activeCat;
                const matchName = !q || card.dataset.name.includes(q) || card.dataset.id.includes(q);
                card.classList.toggle('hidden', !(matchCat && matchName));
            });
            document.querySelectorAll('.category').forEach(sec => {
                sec.classList.toggle('hidden', !sec.querySelectorAll('.item-card:not(.hidden)').length);
            });
        }

        buildCatalog();
    </script>
